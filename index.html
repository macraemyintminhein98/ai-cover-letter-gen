<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cover Letter Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-6">Generate Your Cover Letter</h1>
        <form id="coverLetterForm" class="space-y-4">
            <div>
                <label for="resumeKeywords" class="block text-sm font-medium text-gray-700">Resume Keywords:</label>
                <textarea id="resumeKeywords" rows="3" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>
            <div>
                <label for="jobDescription" class="block text-sm font-medium text-gray-700">Job Description:</label>
                <textarea id="jobDescription" rows="6" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                Generate Letter
            </button>
        </form>
        <div id="result" class="mt-6 p-4 bg-gray-50 border border-gray-200 rounded-md hidden">
            <h2 class="text-lg font-semibold mb-2">Your Cover Letter:</h2>
            <p id="coverLetterContent" class="whitespace-pre-wrap text-gray-800"></p>
        </div>
    </div>
    <script>
        // Placeholder for future JavaScript logic:
        // 1. Form submission to API endpoint
        // 2. Stripe integration for payment
        // 3. Display generated cover letter
        document.getElementById('coverLetterForm').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('This is a demo. Integration with AI and payment gateway would go here!');
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('coverLetterContent').innerText = 'Your personalized cover letter will appear here after payment and generation!';
        });
    </script>
</body>
</html>
